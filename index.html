<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 반 감정 체크판</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #FDF9F1; /* 따뜻한 크림색 배경 */
        }
        /* 스크롤바 숨기기 (선택사항) */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #E2E8F0;
            border-radius: 4px;
        }
        /* 감정 텍스트 줄바꿈 방지 */
        .emotion-text {
            word-break: keep-all;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 text-gray-800">

    <div class="max-w-[1400px] mx-auto flex flex-col md:flex-row justify-between items-start md:items-end mb-6 px-2 gap-4">
        <div>
            <h1 class="text-3xl md:text-4xl font-black text-gray-800 tracking-tight">오늘 내 기분은?</h1>
            <p id="currentDate" class="text-gray-500 font-medium mt-2 text-lg"></p>
        </div>
        <button id="exportBtn" class="flex items-center gap-2 bg-white border border-gray-200 text-gray-600 px-5 py-2.5 rounded-xl shadow-sm hover:bg-gray-50 transition-colors font-medium text-sm w-full md:w-auto justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
            </svg>
            구글 시트 열기
        </button>
    </div>

    <div class="max-w-[1400px] mx-auto grid grid-cols-1 lg:grid-cols-2 gap-6 items-start">
        
        <!-- [왼쪽 영역] 기분 고르기 -->
        <div class="bg-white rounded-[2.5rem] border-[8px] border-[#FFF0F5] p-6 md:p-8 shadow-sm h-full flex flex-col">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl md:text-3xl font-bold text-[#FF4B72] flex items-center gap-3">
                    <span class="text-3xl">🎨</span> 기분 고르기
                </h2>
                <span class="bg-gray-100 text-gray-500 px-5 py-2 rounded-full text-sm font-medium">
                    30가지 감정
                </span>
            </div>
            
            <!-- 감정 버튼 그리드 -->
            <div id="emotionsGrid" class="grid grid-cols-4 sm:grid-cols-5 gap-3 md:gap-4 flex-grow content-start">
                <!-- JavaScript로 감정 버튼들이 렌더링됩니다 -->
            </div>
        </div>

        <!-- [오른쪽 영역] 우리 반 친구들 -->
        <div class="bg-white rounded-[2.5rem] border-[8px] border-[#F0F8FF] p-6 md:p-8 shadow-sm h-full flex flex-col">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl md:text-3xl font-bold text-[#4B7CFF] flex items-center gap-3">
                    <span class="text-3xl">🏫</span> 우리 반 친구들
                </h2>
                <button id="clearAllBtn" class="text-gray-500 hover:text-gray-800 bg-gray-50 hover:bg-gray-100 border border-gray-200 px-5 py-2 rounded-full text-sm transition-colors font-medium">
                    전체 지우기
                </button>
            </div>
            
            <!-- 학생 목록 그리드 -->
            <div id="usersGrid" class="grid grid-cols-2 sm:grid-cols-2 gap-x-4 gap-y-3 md:gap-x-6 md:gap-y-4 flex-grow content-start">
                <!-- JavaScript로 학생 버튼들이 렌더링됩니다 -->
            </div>
        </div>

    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-4 rounded-full shadow-2xl opacity-0 pointer-events-none transition-all duration-300 z-50 flex items-center gap-3 font-medium translate-y-4">
        <span id="toastIcon" class="text-2xl">✅</span>
        <span id="toastMessage" class="text-lg">저장되었습니다.</span>
    </div>

    <script>
        // === 구글 앱스 스크립트 웹앱 URL ===
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyt3zubaFQHSAAej6OjFO57MsBaUFLAyHpmAMqRN1Vir4W-QfAUu9gOkuY4MKeJLiKO/exec';
        const SPREADSHEET_URL = 'https://docs.google.com/spreadsheets/d/1RGs6NjgGk6_OHRtFmcYsMun8PaQpFi2xaNSQDgPc3FM/edit?gid=0#gid=0';

        // --- Data ---
        const USERS = [
            "강윤찬", "강주연", "김민지", "김진후", "김현지", 
            "박채현", "성서아", "송다정", "엄호준", "윤시우", 
            "이솔빛나", "이정", "전성후", "정혜원", "최예은", 
            "한태은", "허은서", "황혜리", "선생님"
        ];

        const EMOTIONS = [
            { emoji: "😀", name: "행복해요" }, { emoji: "🤩", name: "신나요" }, { emoji: "😊", name: "기분좋아요" }, { emoji: "🥰", name: "사랑가득해요" }, { emoji: "😎", name: "자신있어요" },
            { emoji: "🤩", name: "기대돼요" }, { emoji: "😌", name: "편안해요" }, { emoji: "🤤", name: "배고파요" }, { emoji: "🤪", name: "장난치고싶어요" }, { emoji: "😴", name: "졸려요" },
            { emoji: "🥱", name: "피곤해요" }, { emoji: "😐", name: "그냥그래요" }, { emoji: "😕", name: "헷갈려요" }, { emoji: "😟", name: "걱정돼요" }, { emoji: "😔", name: "우울해요" },
            { emoji: "😢", name: "슬퍼요" }, { emoji: "😭", name: "눈물이나요" }, { emoji: "😤", name: "짜증나요" }, { emoji: "😡", name: "화가나요" }, { emoji: "🤬", name: "너무화나요" },
            { emoji: "😱", name: "깜짝놀랐어요" }, { emoji: "😨", name: "무서워요" }, { emoji: "😰", name: "불안해요" }, { emoji: "🤕", name: "아파요" }, { emoji: "😶", name: "멍해요" },
            { emoji: "😳", name: "부끄러워요" }, { emoji: "😫", name: "답답해요" }, { emoji: "🥺", name: "외로워요" }, { emoji: "😌", name: "뿌듯해요" }, { emoji: "🤢", name: "속이안좋아요" }
        ];

        // --- State ---
        let state = {
            todayData: {}, // { "강윤찬": "행복해요" }
            currentUserSelecting: null // 현재 감정을 선택하기 위해 클릭한 학생 이름
        };

        // DOM Elements
        const emotionsGrid = document.getElementById('emotionsGrid');
        const usersGrid = document.getElementById('usersGrid');
        const toast = document.getElementById('toast');
        const toastIcon = document.getElementById('toastIcon');
        const toastMessage = document.getElementById('toastMessage');

        const getDisplayDate = () => {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            const day = days[now.getDay()];
            return `${year}년 ${month}월 ${date}일 (${day})`;
        };

        let toastTimeout;
        const showToast = (message, icon = "✅") => {
            toastIcon.textContent = icon;
            toastMessage.textContent = message;
            toast.classList.remove('opacity-0', 'translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-4');
            }, 3000);
        };

        const getEmojiByName = (emotionName) => {
            const emotion = EMOTIONS.find(e => e.name === emotionName);
            return emotion ? emotion.emoji : '❓';
        };

        const renderUsers = () => {
            usersGrid.innerHTML = '';
            USERS.forEach(user => {
                const isSelected = state.currentUserSelecting === user;
                const userEmotionName = state.todayData[user];
                
                const btn = document.createElement('div');
                // 디자인 시안에 맞춘 스타일 적용 (둥근 모서리, 배경색)
                btn.className = `
                    flex justify-between items-center px-4 md:px-5 py-3 md:py-4 rounded-3xl cursor-pointer transition-all duration-200
                    ${isSelected ? 'bg-blue-50 ring-4 ring-blue-300 shadow-lg scale-[1.02]' : 'bg-[#FAFAFA] hover:bg-gray-100'}
                `;
                
                // 이름
                const nameSpan = document.createElement('span');
                nameSpan.className = `text-[16px] md:text-[18px] ${isSelected ? 'font-black text-blue-700' : 'font-bold text-gray-700'}`;
                nameSpan.textContent = user;

                // 상태 (대기중 or 선택된 감정)
                const statusDiv = document.createElement('div');
                
                if (userEmotionName) {
                    // 감정이 선택된 상태 (알약 모양 디자인)
                    const emoji = getEmojiByName(userEmotionName);
                    statusDiv.className = 'bg-white px-3 py-1.5 rounded-2xl shadow-sm flex items-center gap-2 border border-gray-100';
                    statusDiv.innerHTML = `
                        <span class="text-xl md:text-2xl leading-none">${emoji}</span>
                        <span class="text-[14px] font-bold text-gray-800 emotion-text">${userEmotionName}</span>
                    `;
                } else {
                    // 대기중 상태
                    statusDiv.className = 'text-[15px] font-medium text-gray-300 mr-2';
                    statusDiv.textContent = '대기중';
                }

                btn.appendChild(nameSpan);
                btn.appendChild(statusDiv);

                // 클릭 이벤트
                btn.addEventListener('click', () => {
                    if (state.currentUserSelecting === user) {
                        state.currentUserSelecting = null; // 선택 해제
                    } else {
                        state.currentUserSelecting = user;
                        // 모바일 화면에서는 감정 판으로 스크롤 이동
                        if(window.innerWidth < 1024) {
                             setTimeout(() => {
                                 emotionsGrid.scrollIntoView({ behavior: 'smooth', block: 'center' });
                             }, 100);
                             showToast(`${user} 친구의 기분을 골라주세요!`, "👇");
                        }
                    }
                    renderUsers();
                });

                usersGrid.appendChild(btn);
            });
        };

        const renderEmotions = () => {
            emotionsGrid.innerHTML = '';
            EMOTIONS.forEach(emotion => {
                const btn = document.createElement('div');
                // 디자인 시안에 맞춘 연한 핑크 배경 둥근 사각형
                btn.className = 'bg-[#FFF5F7] hover:bg-pink-100 rounded-3xl p-3 sm:p-4 flex flex-col items-center justify-center cursor-pointer transition-transform hover:-translate-y-1 hover:shadow-md border border-transparent hover:border-pink-300 aspect-square';
                
                // 이름 두 줄 바꿈 처리 (예: 기분좋아요 -> 기분<br>좋아요)
                // 단순히 반으로 자르기보다 단어 형태 유지되도록 공백 처리 (데이터 구조 변경 불가하므로 CSS word-break로 처리 권장, 여기서는 데이터 그대로 출력)
                btn.innerHTML = `
                    <div class="text-4xl sm:text-5xl mb-2 drop-shadow-md">${emotion.emoji}</div>
                    <div class="text-[13px] sm:text-[14px] font-bold text-gray-800 text-center leading-snug emotion-text tracking-tight">${emotion.name.replace(/ /g, '<br>')}</div>
                `;

                btn.addEventListener('click', () => selectEmotion(emotion));

                emotionsGrid.appendChild(btn);
            });
        };

        const selectEmotion = async (emotion) => {
            if (!state.currentUserSelecting) {
                showToast("오른쪽에서 먼저 이름을 선택해주세요!", "👆");
                return;
            }
            
            const user = state.currentUserSelecting;
            const emotionName = emotion.name; 

            // 1. 화면 즉시 반영 (낙관적 업데이트)
            state.todayData[user] = emotionName;
            state.currentUserSelecting = null; 
            renderUsers();
            
            // 2. 구글 시트로 전송
            try {
                const formData = new URLSearchParams();
                formData.append('name', user);
                formData.append('emotion', emotionName);

                fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                }).then(response => {
                    if(response.ok) {
                         showToast(`${user} 친구의 기분이 기록되었습니다.`, "✨");
                    }
                }).catch(e => {
                     console.error(e);
                     showToast("서버 연결에 실패했습니다.", "⚠️");
                });
                
            } catch (error) {
                console.error("Error saving emotion:", error);
                showToast("저장 중 오류가 발생했습니다.", "❌");
            }
        };

        const loadFromGoogleSheet = async () => {
            try {
                // 우측에 로딩 표시 임시로
                toastIcon.textContent = "⏳";
                toastMessage.textContent = "오늘의 기록을 불러오는 중...";
                toast.classList.remove('opacity-0', 'translate-y-4');
                toast.classList.add('opacity-100', 'translate-y-0');

                const response = await fetch(GOOGLE_SCRIPT_URL);
                const data = await response.json();
                state.todayData = data || {};
                renderUsers();
                
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-4');

            } catch (error) {
                console.error("데이터 로드 실패:", error);
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-4');
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('currentDate').textContent = getDisplayDate();
            
            renderEmotions();
            renderUsers();
            loadFromGoogleSheet();

            document.getElementById('exportBtn').addEventListener('click', () => {
                window.open(SPREADSHEET_URL, '_blank');
            });

            document.getElementById('clearAllBtn').addEventListener('click', () => {
                if(Object.keys(state.todayData).length === 0) return;
                
                // alert, confirm 사용 금지 원칙에 따라 커스텀 모달 또는 간단히 바로 리셋하되 안내 메시지 띄움
                // 여기서는 시트 데이터는 지우지 않고 화면만 지운다는 것을 토스트로 알림
                state.todayData = {};
                state.currentUserSelecting = null;
                renderUsers();
                showToast("화면이 초기화되었습니다. (시트 기록은 보존됨)", "🧹");
            });
        });

    </script>
</body>
</html>
